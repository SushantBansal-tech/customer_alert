# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/alert_monitoring_db
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.alertsystem=DEBUG
logging.file.name=logs/app.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=[%d{yyyy-MM-dd HH:mm:ss}] %-5level [%thread] %logger{36} - %msg%n
logging.pattern.console=[%d{HH:mm:ss.SSS}] [%-5level] [%thread] %logger{36} - %msg%n

# Application Configuration
app.log.path=logs/app.log
app.monitoring.interval=30000
app.log.read.interval=10000
app.error.threshold=20
app.critical.error.count=5
app.activity.window=5
app.batch.size=100

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true